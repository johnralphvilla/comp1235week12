interface Walker {
    readonly age: number;
    do_walk(age: number, jaunt?: boolean): string;
}

// keyword implements (interface)
class Person implements Walker {
    readonly age: number;

    constructor(age: number) {
        this.age = age;
    }

    do_walk(age: number, jaunt?: boolean): string {
        if (jaunt) {
            return "Walking for fun";
        }
        return "Walking normal";
    }
}

const p1: Person = new Person(25);
console.log(p1);
console.log(p1.do_walk(25, true));


class Mammal {
    public height: number;
    protected dinner: string;
    private pocket_money: number;

    constructor(m_height: number, m_dinner: string, m_money: number) {
        this.height = m_height;
        this.dinner = m_dinner;
        this.pocket_money = m_money;
    }
}

const m1: Mammal = new Mammal(6, "Sugar Cane", 20);

console.log("Mammal", m1);// inside access sable
console.log("height",m1.height);// Public accessible
